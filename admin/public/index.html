<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星苒鸭 · 博客管理</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }

        .login-bg {
            position: fixed;
            inset: 0;
            background: var(--a-bg-gradient);
            overflow: hidden;
        }

        .login-bg::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            animation: float 20s ease-in-out infinite;
        }

        .login-bg::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .password-wrapper {
            position: relative;
        }

        .login-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 0.75rem 1rem;
            border-radius: var(--a-radius-sm);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }

        .login-error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-bg"></div>

    <div class="login-container">
        <div class="glass-card login-card">
            <div class="login-header">
                <div class="login-logo">星苒鸭</div>
                <p class="login-subtitle">博客管理后台</p>
            </div>

            <div id="loginError" class="login-error"></div>

            <form id="loginForm">
                <div class="form-group">
                    <div class="password-wrapper">
                        <div class="input-floating">
                            <input type="password" id="password" placeholder=" " required autocomplete="current-password">
                            <label for="password">管理密码</label>
                        </div>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 0.875rem;" id="loginBtn">
                    <span id="loginText">登录</span>
                    <div class="spinner" id="loginSpinner" style="display: none;"></div>
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <button type="button" class="btn-icon" id="themeToggle" style="margin: 0 auto;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="/js/admin/core.js"></script>
    <script>
        const { $, Auth, UI, Theme } = AdminCore;

        // Check if already logged in
        if (Auth.check()) {
            location.href = '/admin/';
        }

        // Theme toggle
        $('#themeToggle').onclick = () => {
            Theme.toggle();
            updateThemeIcon();
        };

        function updateThemeIcon() {
            const icon = $('#themeIcon');
            if (Theme.get() === 'dark') {
                icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            } else {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            }
        }
        updateThemeIcon();

        // Password toggle
        $('#togglePassword').onclick = () => {
            const input = $('#password');
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
        };

        // Login form
        $('#loginForm').onsubmit = async (e) => {
            e.preventDefault();

            const password = $('#password').value;
            const btn = $('#loginBtn');
            const text = $('#loginText');
            const spinner = $('#loginSpinner');
            const error = $('#loginError');

            if (!password) {
                error.textContent = '请输入密码';
                error.classList.add('show');
                return;
            }

            btn.disabled = true;
            text.style.display = 'none';
            spinner.style.display = 'block';
            error.classList.remove('show');

            try {
                await Auth.login(password);
                UI.toast('登录成功', 'success');
                setTimeout(() => {
                    location.href = '/admin/';
                }, 500);
            } catch (err) {
                error.textContent = err.message || '密码错误';
                error.classList.add('show');
                btn.disabled = false;
                text.style.display = 'block';
                spinner.style.display = 'none';
            }
        };
    </script>
</body>
</html>
