<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写文章 - 星苒鸭</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }

        .editor-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 1.5rem;
            height: calc(100vh - 180px);
        }

        .editor-main {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .editor-main .EasyMDEContainer {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .editor-main .EasyMDEContainer .CodeMirror {
            flex: 1;
            height: auto !important;
        }

        .editor-sidebar {
            height: 100%;
            overflow-y: auto;
        }

        .meta-card {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .tag-input-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.5rem;
            border: 1px solid var(--a-border);
            border-radius: var(--a-radius-sm);
            background: rgba(255, 255, 255, 0.5);
            min-height: 42px;
        }

        .dark .tag-input-wrapper {
            background: rgba(15, 23, 42, 0.5);
        }

        .tag-input-wrapper input {
            flex: 1;
            min-width: 80px;
            border: none;
            background: transparent;
            outline: none;
            color: var(--a-text);
            font-size: 0.875rem;
        }

        .tag-item {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            background: var(--a-primary-light);
            color: var(--a-primary);
            border-radius: 0.375rem;
            font-size: 0.75rem;
        }

        .tag-item button {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            opacity: 0.7;
        }

        .tag-item button:hover {
            opacity: 1;
        }

        @media (max-width: 1024px) {
            .editor-layout {
                grid-template-columns: 1fr;
                height: auto;
            }
            .editor-sidebar {
                height: auto;
                order: -1;
            }
        }

        /* EasyMDE 全屏模式修复 */
        .EasyMDEContainer.fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999 !important;
            margin: 0 !important;
        }

        /* EasyMDE 对比模式修复 */
        .EasyMDEContainer.side-by-side {
            display: flex;
            flex-direction: row;
        }

        .EasyMDEContainer.side-by-side .CodeMirror {
            flex: 1;
            height: auto !important;
        }

        .EasyMDEContainer.side-by-side .editor-preview {
            flex: 1;
            overflow-y: auto;
        }

        /* 全屏时隐藏侧边栏 */
        .editor-layout:has(.EasyMDEContainer.fullscreen) .editor-sidebar {
            display: none;
        }

        /* 对比模式下的编辑器高度 */
        .editor-main .EasyMDEContainer.side-by-side .CodeMirror,
        .editor-main .EasyMDEContainer.side-by-side .editor-preview {
            height: 100% !important;
        }

        /* 图片选择器模态框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: var(--a-bg-card);
            border-radius: var(--a-radius);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .modal-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--a-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { margin: 0; font-size: 1rem; font-weight: 600; }
        .modal-body {
            padding: 1.25rem;
            overflow-y: auto;
            flex: 1;
        }
        .modal-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .modal-tab {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--a-border);
            border-radius: var(--a-radius-sm);
            cursor: pointer;
            color: var(--a-text-2);
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .modal-tab.active {
            background: var(--a-primary);
            color: white;
            border-color: var(--a-primary);
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.75rem;
            max-height: 300px;
            overflow-y: auto;
        }
        .image-grid-item {
            aspect-ratio: 1;
            border-radius: var(--a-radius-sm);
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .image-grid-item:hover { border-color: var(--a-primary); transform: scale(1.02); }
        .image-grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .url-tab-content { display: none; }
        .url-tab-content.show { display: block; }
    </style>
</head>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="btn-icon" id="menuBtn" style="display: none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                <input type="text" id="postTitle" class="form-input" placeholder="输入文章标题..." style="font-size: 1.25rem; font-weight: 600; border: none; background: transparent; padding: 0; max-width: 400px;">

    <!-- 图片选择器模态框 -->
    <div class="modal-overlay" id="imageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>插入图片</h3>

                <!-- 媒体库选项卡 -->

                <!-- URL 选项卡 -->

                    </div>
                    <div class="form-group">

                        <input type="text" id="imageAlt" class="form-input" placeholder="图片描述">

    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
    <script src="/js/admin/core.js"></script>
    <script>
        const { $, $$, API, Auth, UI, Theme, Utils, Router } = AdminCore;

        if (!Auth.requireAuth()) throw new Error('Unauthorized');

        // Mobile menu
        const menuBtn = $('#menuBtn');
        const sidebar = $('#sidebar');
        const overlay = $('#sidebarOverlay');

        function checkMobile() {
            menuBtn.style.display = window.innerWidth <= 1024 ? 'flex' : 'none';
            if (window.innerWidth > 1024) {
                sidebar.classList.remove('open');
                overlay.classList.remove('open');
            }
        }
        checkMobile();
        window.addEventListener('resize', checkMobile);

        menuBtn.onclick = () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        };
        overlay.onclick = () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        };

        // Theme
        $('#themeToggle').onclick = () => {
            Theme.toggle();
            updateThemeIcon();
        };

        function updateThemeIcon() {
            const icon = $('#themeIcon');
            icon.innerHTML = Theme.get() === 'dark'
                ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'
                : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        }
        updateThemeIcon();

        $('#logoutBtn').onclick = (e) => { e.preventDefault(); Auth.logout(); };

        // State
        let isEditMode = false;
        let originalFilename = '';
        let categories = [];
        let tags = [];

        // Get current file for autosave ID
        const params = Router.getParams();
        const currentFile = params.file || 'new-post';
        const autosaveId = `blog-editor-${currentFile}`;

        // Initialize EasyMDE
        const easyMDE = new EasyMDE({
            element: $('#editor'),
            spellChecker: false,
            autosave: {
                enabled: true,
                uniqueId: autosaveId,
                delay: 5000
            },
            toolbar: [
                'bold', 'italic', 'heading', '|',
                'quote', 'unordered-list', 'ordered-list', '|',
                'link', 'image', 'table', '|',
                'preview', 'side-by-side', 'fullscreen', '|',
                'guide'
            ],
            placeholder: '开始写作...',
            status: false
        });

        // Tag input helper
        function createTagInput(wrapperId, inputId, array) {
            const wrapper = $(wrapperId);
            const input = $(inputId);

            function render() {
                const tags = wrapper.querySelectorAll('.tag-item');
                tags.forEach(t => t.remove());

                array.forEach((item, index) => {
                    const tag = document.createElement('span');
                    tag.className = 'tag-item';
                    tag.innerHTML = `${Utils.escapeHtml(item)}<button type="button" data-index="${index}">&times;</button>`;
                    wrapper.insertBefore(tag, input);
                });
            }

            input.onkeydown = (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    const value = input.value.trim();
                    if (value && !array.includes(value)) {
                        array.push(value);
                        render();
                    }
                    input.value = '';
                }
                if (e.key === 'Backspace' && !input.value && array.length > 0) {
                    array.pop();
                    render();
                }
            };

            wrapper.onclick = (e) => {
                if (e.target.tagName === 'BUTTON') {
                    const index = parseInt(e.target.dataset.index);
                    array.splice(index, 1);
                    render();
                }
                input.focus();
            };

            return { render };
        }

        const categoryInput = createTagInput('#categoriesWrapper', '#categoryInput', categories);
        const tagInput = createTagInput('#tagsWrapper', '#tagInput', tags);

        // Cover image preview
        $('#coverImage').oninput = Utils.debounce(() => {
            const url = $('#coverImage').value;
            const preview = $('#coverPreview');
            if (url) {
                preview.querySelector('img').src = url;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        }, 300);

        // Auto-generate filename from title
        $('#postTitle').oninput = Utils.debounce(() => {
            if (!isEditMode && !$('#filename').value) {
                const title = $('#postTitle').value;
                if (title) {
                    $('#filename').value = Utils.slug(title) + '.md';
                }
            }
        }, 300);

        // 图片选择器模态框逻辑
        const imageModal = $('#imageModal');
        const imageGrid = $('#imageGrid');
        let mediaListCache = [];

        // 打开模态框
        $('#insertImageBtn').onclick = async () => {
            imageModal.classList.add('show');
            await loadMediaForPicker();
        };

        // 关闭模态框
        $('#closeImageModal').onclick = () => imageModal.classList.remove('show');
        imageModal.onclick = (e) => {
            if (e.target === imageModal) imageModal.classList.remove('show');
        };

        // 选项卡切换
        $$('.modal-tab').forEach(tab => {
            tab.onclick = () => {
                $$('.modal-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                $('#libraryTab').classList.toggle('show', tabName === 'library');
                $('#urlTab').classList.toggle('show', tabName === 'url');
            };
        });

        // 加载媒体库图片
        async function loadMediaForPicker() {
            imageGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--a-text-3);">加载中...</div>';
            try {
                mediaListCache = await API.get('/media', { silent: true }) || [];
                renderMediaGrid();
            } catch (e) {
                imageGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--a-danger);">加载失败</div>';
            }
        }

        function renderMediaGrid() {
            if (mediaListCache.length === 0) {
                imageGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--a-text-3);">暂无图片，请先上传</div>';
                return;
            }
            imageGrid.innerHTML = mediaListCache.map((file, idx) => `
                <div class="image-grid-item" data-url="${file.url}" data-name="${Utils.escapeHtml(file.name)}">
                    <img src="${file.url}" alt="${Utils.escapeHtml(file.name)}" loading="lazy">
                </div>
            `).join('');

            // 点击选择图片
            $$('.image-grid-item').forEach(item => {
                item.onclick = () => {
                    const url = item.dataset.url;
                    const name = item.dataset.name;
                    insertImageToEditor(url, name);
                    imageModal.classList.remove('show');
                };
            });
        }

        // 从 URL 插入图片
        $('#insertUrlImageBtn').onclick = () => {
            const url = $('#imageUrl').value.trim();
            const alt = $('#imageAlt').value.trim() || '图片';
            if (!url) {
                UI.toast('请输入图片 URL', 'warning');
                return;
            }
            insertImageToEditor(url, alt);
            imageModal.classList.remove('show');
            $('#imageUrl').value = '';
            $('#imageAlt').value = '';
        };

        // 插入图片到编辑器
        function insertImageToEditor(url, alt) {
            const cm = easyMDE.codemirror;
            const pos = cm.getCursor();
            cm.replaceRange(`![${alt}](${url})`, pos);
            cm.focus();
        }

        // Load post for editing
        async function loadPost(filename) {
            try {
                const data = await API.get(`/posts/${encodeURIComponent(filename)}`);

                isEditMode = true;
                originalFilename = filename;

                $('#postTitle').value = data.frontMatter.title || '';
                $('#filename').value = filename;
                easyMDE.value(data.content || '');

                if (data.frontMatter.date) {
                    const date = new Date(data.frontMatter.date);
                    $('#postDate').value = date.toISOString().slice(0, 16);
                }

                if (data.frontMatter.categories) {
                    categories.length = 0;
                    const cats = Array.isArray(data.frontMatter.categories) ? data.frontMatter.categories : [data.frontMatter.categories];
                    cats.forEach(c => categories.push(c));
                    categoryInput.render();
                }

                if (data.frontMatter.tags) {
                    tags.length = 0;
                    const ts = Array.isArray(data.frontMatter.tags) ? data.frontMatter.tags : [data.frontMatter.tags];
                    ts.forEach(t => tags.push(t));
                    tagInput.render();
                }

                if (data.frontMatter.cover) {
                    $('#coverImage').value = data.frontMatter.cover;
                    $('#coverPreview').querySelector('img').src = data.frontMatter.cover;
                    $('#coverPreview').style.display = 'block';
                }

                if (data.frontMatter.banner) {
                    $('#postBanner').value = data.frontMatter.banner;
                }

                document.title = `编辑: ${data.frontMatter.title} - 星苒鸭`;

            } catch (e) {
                UI.toast('加载文章失败', 'error');
            }
        }

        // Save post
        $('#saveBtn').onclick = async () => {
            const title = $('#postTitle').value.trim();
            let filename = $('#filename').value.trim();
            const content = easyMDE.value();

            if (!title) {
                UI.toast('请输入文章标题', 'warning');
                return;
            }

            if (!filename) {
                filename = Utils.slug(title) + '.md';
            }
            if (!filename.endsWith('.md')) {
                filename += '.md';
            }

            const frontMatter = {
                title,
                date: $('#postDate').value ? new Date($('#postDate').value) : new Date(),
                categories: categories.length > 0 ? categories : undefined,
                tags: tags.length > 0 ? tags : undefined
            };

            const cover = $('#coverImage').value.trim();
            if (cover) frontMatter.cover = cover;

            const banner = $('#postBanner').value.trim();
            if (banner) frontMatter.banner = banner;

            try {
                $('#saveStatus').textContent = '保存中...';

                if (isEditMode) {
                    await API.put(`/posts/${encodeURIComponent(originalFilename)}`, {
                        content,
                        frontMatter
                    });
                } else {
                    await API.post('/posts', {
                        title,
                        filename,
                        content,
                        frontMatter
                    });
                    isEditMode = true;
                    originalFilename = filename;
                }

                $('#saveStatus').textContent = '已保存';
                UI.toast('保存成功', 'success');

                setTimeout(() => {
                    $('#saveStatus').textContent = '';
                }, 3000);

            } catch (e) {
                $('#saveStatus').textContent = '保存失败';
            }
        };

        // Keyboard shortcut
        document.onkeydown = (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                $('#saveBtn').click();
            }
        };

        // Init
        if (params.file) {
            loadPost(params.file);
        } else {
            // New post
            const now = new Date();
            $('#postDate').value = now.toISOString().slice(0, 16);
        }
    </script>
</body>
</html>
