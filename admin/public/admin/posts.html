<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 - 星苒鸭</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body>
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="glass-sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">星苒鸭</div>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                控制台
            </a>
            <a href="/admin/posts.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
                    <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
                    <circle cx="11" cy="11" r="2"></circle>
                </svg>
                文章管理
            </a>
            <a href="/admin/editor.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                写文章
            </a>
            <a href="/admin/media.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                媒体库
            </a>
            <a href="/admin/masonry.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="9"></rect>
                    <rect x="14" y="3" width="7" height="5"></rect>
                    <rect x="14" y="12" width="7" height="9"></rect>
                    <rect x="3" y="16" width="7" height="5"></rect>
                </svg>
                图片墙
            </a>
            <div class="nav-section-title">系统</div>
            <a href="/admin/deploy.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
                部署管理
            </a>
            <a href="/admin/settings.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                站点设置
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" class="nav-item" id="logoutBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                退出登录
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <button class="btn-icon" id="menuBtn" style="display: none;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div style="display: flex; gap: 0.5rem; align-items: center; margin-left: auto;">
                <button class="btn-icon" id="themeToggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <div class="user-avatar">星</div>
            </div>
        </header>

        <!-- Page Header -->
        <div class="page-header">
            <div>
                <h1 class="page-title">文章管理</h1>
                <p class="page-subtitle">管理所有发布的文章</p>
            </div>
            <a href="/admin/editor.html" class="btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                新建文章
            </a>
        </div>

        <!-- Content Card -->
        <div class="glass-card" style="padding: 1.5rem;">
            <!-- Toolbar -->
            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
                <div class="search-box" style="flex: 1; min-width: 200px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索文章标题...">
                </div>
                <button class="btn-secondary" id="refreshBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    刷新
                </button>
            </div>

            <!-- Table -->
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 40%;">标题</th>
                            <th>分类</th>
                            <th>标签</th>
                            <th>日期</th>
                            <th style="text-align: right;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="postsList">
                        <tr><td colspan="5" style="text-align: center; color: var(--a-text-3); padding: 3rem;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination" style="display: none;"></div>
        </div>
    </main>

    <script src="/js/admin/core.js"></script>
    <script>
        const { $, $$, API, Auth, UI, Theme, Utils, Router } = AdminCore;

        if (!Auth.requireAuth()) throw new Error('Unauthorized');

        // Mobile menu
        const menuBtn = $('#menuBtn');
        const sidebar = $('#sidebar');
        const overlay = $('#sidebarOverlay');

        function checkMobile() {
            menuBtn.style.display = window.innerWidth <= 1024 ? 'flex' : 'none';
            if (window.innerWidth > 1024) {
                sidebar.classList.remove('open');
                overlay.classList.remove('open');
            }
        }
        checkMobile();
        window.addEventListener('resize', checkMobile);

        menuBtn.onclick = () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        };
        overlay.onclick = () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        };

        // Theme
        $('#themeToggle').onclick = () => {
            Theme.toggle();
            updateThemeIcon();
        };

        function updateThemeIcon() {
            const icon = $('#themeIcon');
            icon.innerHTML = Theme.get() === 'dark'
                ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'
                : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        }
        updateThemeIcon();

        $('#logoutBtn').onclick = (e) => { e.preventDefault(); Auth.logout(); };

        // State
        let currentPage = 1;
        let totalPages = 1;
        let searchQuery = '';

        // Load posts
        async function loadPosts() {
            try {
                const data = await API.get(`/posts?page=${currentPage}&limit=10&search=${encodeURIComponent(searchQuery)}`);
                totalPages = data.totalPages || 1;
                renderPosts(data.posts || []);
                renderPagination();
            } catch (e) {
                $('#postsList').innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--a-danger); padding: 2rem;">加载失败</td></tr>';
            }
        }

        function renderPosts(posts) {
            const tbody = $('#postsList');

            if (posts.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-state" style="padding: 3rem;">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity: 0.3; margin-bottom: 1rem;">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                            <h3>暂无文章</h3>
                            <p>点击右上角按钮创建第一篇文章</p>
                        </td>
                    </tr>`;
                return;
            }

            tbody.innerHTML = posts.map(post => {
                const categories = Array.isArray(post.categories) ? post.categories : (post.categories ? [post.categories] : []);
                const tags = Array.isArray(post.tags) ? post.tags : (post.tags ? [post.tags] : []);

                return `
                    <tr>
                        <td>
                            <div style="font-weight: 500; margin-bottom: 0.25rem;">${Utils.escapeHtml(post.title)}</div>
                            <div style="font-size: 0.75rem; color: var(--a-text-3);">${Utils.escapeHtml(post.filename)}</div>
                        </td>
                        <td>
                            ${categories.length > 0 ? categories.map(c => `<span class="badge badge-primary">${Utils.escapeHtml(c)}</span>`).join(' ') : '<span style="color: var(--a-text-3);">-</span>'}
                        </td>
                        <td>
                            ${tags.length > 0 ? tags.slice(0, 3).map(t => `<span class="tag" style="font-size: 0.7rem; padding: 0.2rem 0.5rem;">${Utils.escapeHtml(t)}</span>`).join('') : '<span style="color: var(--a-text-3);">-</span>'}
                        </td>
                        <td style="color: var(--a-text-2);">${Utils.formatDate(post.date)}</td>
                        <td style="text-align: right;">
                            <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                                <a href="/admin/editor.html?file=${encodeURIComponent(post.filename)}" class="btn-icon tooltip" data-tip="编辑">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                    </svg>
                                </a>
                                <button class="btn-icon tooltip" data-tip="删除" onclick="deletePost('${Utils.escapeHtml(post.filename)}', '${Utils.escapeHtml(post.title)}')">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="3 6 5 6 21 6"></polyline>
                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            }).join('');
        }

        function renderPagination() {
            const container = $('#pagination');
            if (totalPages <= 1) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'flex';
            let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">上一页</button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<button disabled>...</button>`;
                }
            }

            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">下一页</button>`;
            container.innerHTML = html;
        }

        window.goToPage = (page) => {
            currentPage = page;
            loadPosts();
        };

        window.deletePost = async (filename, title) => {
            const confirmed = await UI.confirm(`确定要删除文章 "${title}" 吗？此操作不可撤销。`);
            if (confirmed) {
                try {
                    await API.delete(`/posts/${encodeURIComponent(filename)}`);
                    UI.toast('文章已删除', 'success');
                    loadPosts();
                } catch (e) {
                    // Error handled by API
                }
            }
        };

        // Search
        const searchInput = $('#searchInput');
        const debouncedSearch = Utils.debounce(() => {
            searchQuery = searchInput.value;
            currentPage = 1;
            loadPosts();
        }, 300);
        searchInput.oninput = debouncedSearch;

        // Refresh
        $('#refreshBtn').onclick = () => loadPosts();

        // Init
        loadPosts();
    </script>
</body>
</html>
