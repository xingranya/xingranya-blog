<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 - 星苒鸭</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body>
    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="glass-sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">星苒鸭</div>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                控制台
            </a>
            <a href="/admin/posts.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
                    <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
                    <path d="M2 2l7.586 7.586"></path>
                    <circle cx="11" cy="11" r="2"></circle>
                </svg>
                文章管理
            </a>
            <a href="/admin/editor.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                写文章
            </a>
            <a href="/admin/media.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                媒体库
            </a>
            <a href="/admin/masonry.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="9"></rect>
                    <rect x="14" y="3" width="7" height="5"></rect>
                    <rect x="14" y="12" width="7" height="9"></rect>
                    <rect x="3" y="16" width="7" height="5"></rect>
                </svg>
                图片墙
            </a>

            <div class="nav-section-title">系统</div>
            <a href="/admin/deploy.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
                部署管理
            </a>
            <a href="/admin/settings.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                站点设置
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" class="nav-item" id="logoutBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                退出登录
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <button class="btn-icon" id="menuBtn" style="display: none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <button class="btn-icon" id="themeToggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <div class="user-avatar">星</div>
            </div>
        </header>

        <!-- Welcome -->
        <div class="page-header">
            <div>
                <h1 class="page-title">欢迎回来，星然</h1>
                <p class="page-subtitle">这里是你的博客概览</p>
            </div>
            <a href="/admin/editor.html" class="btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                写文章
            </a>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon pink">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
                            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
                        </svg>
                    </div>
                </div>
                <div class="stat-value" id="statPosts">-</div>
                <div class="stat-label">文章总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon purple">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                </div>
                <div class="stat-value" id="statCategories">-</div>
                <div class="stat-label">分类数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon cyan">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                            <line x1="7" y1="7" x2="7.01" y2="7"></line>
                        </svg>
                    </div>
                </div>
                <div class="stat-value" id="statTags">-</div>
                <div class="stat-label">标签数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon green">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </div>
                </div>
                <div class="stat-value" id="statMedia">-</div>
                <div class="stat-label">媒体文件</div>
            </div>
        </div>

        <!-- Content Grid -->
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
            <!-- Recent Posts -->
            <div class="glass-card" style="padding: 1.5rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3 style="font-size: 1.125rem; font-weight: 600;">最近文章</h3>
                    <a href="/admin/posts.html" class="btn-secondary btn-sm">查看全部</a>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>标题</th>
                            <th>日期</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="recentPosts">
                        <tr><td colspan="3" style="text-align: center; color: var(--a-text-3);">加载中...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Quick Actions & Info -->
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <!-- Quick Actions -->
                <div class="glass-card" style="padding: 1.5rem;">
                    <h3 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem;">快捷操作</h3>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <a href="/admin/editor.html" class="btn-primary" style="justify-content: center;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            新建文章
                        </a>
                        <button class="btn-secondary" style="justify-content: center;" id="deployBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                            </svg>
                            重新部署
                        </button>
                    </div>
                </div>

                <!-- Monthly Chart -->
                <div class="glass-card" style="padding: 1.5rem;">
                    <h3 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem;">发文趋势</h3>
                    <div style="height: 180px;">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/admin/core.js"></script>
    <script>
        const { $, $$, API, Auth, UI, Theme, Utils } = AdminCore;

        // Check auth
        if (!Auth.requireAuth()) {
            throw new Error('Unauthorized');
        }

        // Mobile menu
        const menuBtn = $('#menuBtn');
        const sidebar = $('#sidebar');
        const overlay = $('#sidebarOverlay');

        function checkMobile() {
            if (window.innerWidth <= 1024) {
                menuBtn.style.display = 'flex';
            } else {
                menuBtn.style.display = 'none';
                sidebar.classList.remove('open');
                overlay.classList.remove('open');
            }
        }
        checkMobile();
        window.addEventListener('resize', checkMobile);

        menuBtn.onclick = () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        };

        overlay.onclick = () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        };

        // Theme toggle
        $('#themeToggle').onclick = () => {
            Theme.toggle();
            updateThemeIcon();
            if (window.monthlyChart) {
                updateChartTheme();
            }
        };

        function updateThemeIcon() {
            const icon = $('#themeIcon');
            if (Theme.get() === 'dark') {
                icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            } else {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            }
        }
        updateThemeIcon();

        // Logout
        $('#logoutBtn').onclick = (e) => {
            e.preventDefault();
            Auth.logout();
        };

        // Deploy
        $('#deployBtn').onclick = async () => {
            const confirmed = await UI.confirm('确定要重新部署博客吗？');
            if (confirmed) {
                try {
                    await API.post('/deploy/generate');
                    UI.toast('部署任务已启动', 'success');
                } catch (e) {
                    // Error handled by API
                }
            }
        };

        // Load stats
        async function loadStats() {
            try {
                const stats = await API.get('/dashboard/stats', { silent: true });
                $('#statPosts').textContent = stats.postsCount || 0;
                $('#statCategories').textContent = stats.categoriesCount || 0;
                $('#statTags').textContent = stats.tagsCount || 0;
                $('#statMedia').textContent = stats.mediaCount || 0;
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        // Load recent posts
        async function loadRecentPosts() {
            try {
                const data = await API.get('/posts?limit=5', { silent: true });
                const tbody = $('#recentPosts');

                if (!data.posts || data.posts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="empty-state" style="padding: 2rem;"><p>暂无文章</p></td></tr>';
                    return;
                }

                tbody.innerHTML = data.posts.map(post => `
                    <tr style="cursor: pointer;" onclick="location.href='/admin/editor.html?file=${encodeURIComponent(post.filename)}'">
                        <td style="font-weight: 500;">${Utils.escapeHtml(post.title)}</td>
                        <td style="color: var(--a-text-3);">${Utils.formatDate(post.date)}</td>
                        <td><span class="badge badge-success">已发布</span></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Failed to load recent posts:', e);
            }
        }

        // Load monthly stats and render chart
        let monthlyChart = null;

        async function loadMonthlyStats() {
            try {
                const data = await API.get('/dashboard/monthly', { silent: true });
                renderChart(data);
            } catch (e) {
                console.error('Failed to load monthly stats:', e);
            }
        }

        function renderChart(data) {
            const ctx = $('#monthlyChart').getContext('2d');
            const isDark = Theme.get() === 'dark';
            const textColor = isDark ? 'rgba(241, 245, 249, 0.7)' : 'rgba(15, 23, 42, 0.7)';
            const gridColor = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.05)';

            if (monthlyChart) {
                monthlyChart.destroy();
            }

            monthlyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.month.split('-')[1] + '月'),
                    datasets: [{
                        label: '文章数',
                        data: data.map(d => d.count),
                        backgroundColor: 'rgba(236, 72, 153, 0.5)',
                        borderColor: '#ec4899',
                        borderWidth: 1,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: textColor }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: gridColor },
                            ticks: { color: textColor, stepSize: 1 }
                        }
                    }
                }
            });
            window.monthlyChart = monthlyChart;
        }

        function updateChartTheme() {
            if (monthlyChart) {
                const isDark = Theme.get() === 'dark';
                const textColor = isDark ? 'rgba(241, 245, 249, 0.7)' : 'rgba(15, 23, 42, 0.7)';
                const gridColor = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.05)';

                monthlyChart.options.scales.x.ticks.color = textColor;
                monthlyChart.options.scales.y.ticks.color = textColor;
                monthlyChart.options.scales.y.grid.color = gridColor;
                monthlyChart.update();
            }
        }

        // Init
        loadStats();
        loadRecentPosts();
        loadMonthlyStats();
    </script>
</body>
</html>
